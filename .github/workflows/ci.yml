name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wpref
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install djangorestframework-simplejwt drf-nested-routers

      - name: Run backend tests
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py test

      - name: Check backend migrations are up to date
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py makemigrations --check --dry-run

      - name: Generate OpenAPI
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py spectacular --file openapi.yaml

      - name: Run deploy checks
        env:
          DJANGO_ENV: prod
          SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: ci.local
          DATABASE_URL: sqlite:///ci.sqlite3
          FRONTEND_BASE_URL: https://ci.local
          DEFAULT_FROM_EMAIL: ci.local@wpref.test
          EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
          CSRF_TRUSTED_ORIGINS: https://ci.local
        run: python manage.py check --deploy

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wpref-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wpref-frontend/package-lock.json

      - uses: browser-actions/setup-chrome@v1

      - name: Install frontend dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: CHROME_BIN=$(which chrome) npm test -- --watch=false --browsers=ChromeHeadless

      - name: Run production build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

  contract:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wpref-frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r wpref/requirements.txt
          pip install djangorestframework-simplejwt drf-nested-routers
          cd wpref-frontend
          npm ci

      - name: Regenerate OpenAPI and frontend client
        shell: pwsh
        run: ./scripts/sync-openapi.ps1

      - name: Ensure generated artifacts are committed
        run: git diff --exit-code -- wpref/openapi.yaml wpref-frontend/openapi.yaml wpref-frontend/src/app/api/generated
