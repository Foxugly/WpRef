name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  backend-auth:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wpref
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install djangorestframework-simplejwt drf-nested-routers

      - name: Run auth and core tests
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          PYTHONUNBUFFERED: "1"
        run: python manage.py test core.tests customuser.tests --verbosity 2 --parallel 2

  backend-catalog:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wpref
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install djangorestframework-simplejwt drf-nested-routers

      - name: Run catalog tests
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          PYTHONUNBUFFERED: "1"
        run: python manage.py test language.tests domain.tests subject.tests question.tests translation.tests --verbosity 2 --parallel 2

  backend-quiz:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wpref
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install djangorestframework-simplejwt drf-nested-routers

      - name: Run quiz tests
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          PYTHONUNBUFFERED: "1"
        run: python manage.py test quiz.tests --verbosity 2 --parallel 2

  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wpref
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install djangorestframework-simplejwt drf-nested-routers
          pip install ruff

      - name: Run backend lint
        run: ruff check . --exclude migrations

      - name: Check backend migrations are up to date
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py makemigrations --check --dry-run

      - name: Generate OpenAPI
        env:
          DJANGO_ENV: dev
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
        run: python manage.py spectacular --file openapi.yaml

      - name: Run deploy checks
        env:
          DJANGO_ENV: prod
          SECRET_KEY: ci-secret-key
          ALLOWED_HOSTS: ci.local
          DATABASE_URL: sqlite:///ci.sqlite3
          FRONTEND_BASE_URL: https://ci.local
          DEFAULT_FROM_EMAIL: ci.local@wpref.test
          EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
          CSRF_TRUSTED_ORIGINS: https://ci.local
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
        run: python manage.py check --deploy

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wpref-frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wpref-frontend/package-lock.json

      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Run unit tests
        env:
          CHROME_REAL_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          cat <<'EOF' > chrome-no-sandbox
          #!/usr/bin/env bash
          exec "$CHROME_REAL_BIN" --no-sandbox --disable-dev-shm-usage "$@"
          EOF
          chmod +x chrome-no-sandbox
          CHROME_BIN="$PWD/chrome-no-sandbox" npm test -- --watch=false --browsers=ChromeHeadless

      - name: Run production build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

  contract:
    runs-on: ubuntu-latest
    needs:
      - backend-auth
      - backend-catalog
      - backend-quiz
      - backend-quality
      - frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wpref-frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r wpref/requirements.txt
          pip install djangorestframework-simplejwt drf-nested-routers
          cd wpref-frontend
          npm ci

      - name: Regenerate OpenAPI and frontend client
        shell: pwsh
        run: ./scripts/sync-openapi.ps1

      - name: Ensure generated artifacts are committed
        run: git diff --exit-code -- wpref/openapi.yaml wpref-frontend/openapi.yaml wpref-frontend/src/app/api/generated
