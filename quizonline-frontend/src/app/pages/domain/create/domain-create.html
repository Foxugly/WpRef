<div class="page">
  <div class="header-line">
    <div class="header-line__left">
      <p-button
        (onClick)="goList()"
        icon="pi pi-arrow-left"
        [label]="ui().common.back"
        class="page-back-button"
        severity="secondary"
        type="button"
        variant="outlined">
      </p-button>
    </div>

    <div class="header-center">
      <h1 class="title">{{ ui().pages.domainCreate.title }}</h1>
      <p class="subtitle muted">{{ ui().pages.domainCreate.subtitle }}</p>
    </div>

    <div class="header-line__right"></div>
  </div>

  @if (loading()) {
    <div class="card">
      <p class="muted">Chargement...</p>
    </div>
  } @else {
    <app-domain-editor-form
      [activeTab]="activeTab()"
      [availableStaff]="availableStaff()"
      [form]="form"
      [langCodeOptions]="langCodeOptions()"
      [ownerOptions]="ownerOptions()"
      [ownerPlaceholder]="ui().domainForm.owner"
      [ownerReadonly]="true"
      [selectedStaff]="selectedStaff()"
      [submitError]="submitError()"
      [submitLabel]="ui().common.create"
      [tabCodes]="tabCodes()"
      [titleLabel]="ui().domainForm.titleLabel"
      [translating]="translating()"
      (cancel)="goList()"
      (managersPickListChange)="onStaffPickListChange()"
      (submitForm)="submit()"
      (tabValueChange)="onTabValueChange($event)"
      (translateClick)="translateFrom($event)">
    </app-domain-editor-form>
  }
</div>
