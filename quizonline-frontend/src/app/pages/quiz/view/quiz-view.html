<div class="page">
  @if (loading()) {
    <div class="question-detail__status">Chargement...</div>
  } @else if (error()) {
    <div class="question-detail__status question-detail__status--error">
      {{ error() }}
    </div>
  } @else if (quizSession(); as session) {
    <app-quiz-summary-hero
      [session]="session"
      [statusLabel]="status().label"
      [statusSeverity]="status().severity"
      [showScore]="showScore()"
      [scoreLabel]="scoreLabel()"
      [scoreMetaLabel]="scoreMetaLabel()"
      [facts]="summaryFacts()"
      [canReview]="canReview()"
      (back)="goBack()"
      (start)="goStart()"
      (openQuestion)="goQuestion()"
    />
  }
</div>
