<div class="page">
  <div class="header-line header-line--grid">
    <div class="header-spacer"></div>

    <div class="header-center">
      <h1 class="title">Sujets</h1>
      <p class="subtitle muted">Recherche, liste et actions</p>
    </div>

    <div class="header-actions"></div>
  </div>

  <div class="card">
    <div class="card-head">
      <h2 class="card-title"></h2>

      <div class="card-actions">
        <input
          pInputText
          placeholder="Rechercher..."
          [ngModel]="q()"
          (ngModelChange)="q.set($event); load()"
        />

        <p-button
          (onClick)="goNew()"
          icon="pi pi-plus"
          label="Nouveau"
          severity="primary"
          type="button">
        </p-button>
      </div>
    </div>

    <p-table
      [paginator]="rowsData().length > rows"
      [rows]="rows"
      [rowsPerPageOptions]="[5, 10, 20, 50]"
      [value]="rowsData()"
      showGridlines
      size="small"
      sortMode="single"
      stripedRows
      styleClass="table"
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="id">ID <p-sortIcon field="id"></p-sortIcon></th>
          <th pSortableColumn="name">Nom <p-sortIcon field="name"></p-sortIcon></th>
          <th pSortableColumn="description">Description <p-sortIcon field="description"></p-sortIcon></th>
          <th pSortableColumn="domainName">Domaine <p-sortIcon field="domainName"></p-sortIcon></th>
          <th pSortableColumn="questionsCount">Questions <p-sortIcon field="questionsCount"></p-sortIcon></th>
          <th class="col-actions">Actions</th>
        </tr>
      </ng-template>

      <ng-template #body let-s>
        <tr>
          <td class="center-cell">{{ s.id }}</td>

          <td>{{ s.name }}</td>

          <td class="muted desc-cell">
            <div class="desc" [innerHTML]="s.description | stripP"></div>
          </td>

          <td>
            <p-button
              (onClick)="goDomain(s.domain)"
              [label]="s.domainName"
              severity="secondary"
              size="small"
              type="button"
              variant="outlined">
            </p-button>
          </td>

          <td class="center-cell">{{ s.questionsCount }}</td>

          <td class="col-actions">
            <div class="row-actions">
              <p-button
                (click)="goEdit(s.id)"
                icon="pi pi-pencil"
                id="btn_edit_subject"
                severity="info"
                size="small"
                type="button">
              </p-button>

              <p-button
                (click)="goDelete(s.id)"
                icon="pi pi-trash"
                id="btn_delete_subject"
                severity="danger"
                size="small"
                type="button">
              </p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>

  </div>
</div>
