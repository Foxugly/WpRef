openapi: 3.0.3
info:
  title: WpRef API
  version: 1.0.0
paths:
  /api/domain/:
    get:
      operationId: domain_list
      description: |-
        Retourne la liste des domaines visibles par l'utilisateur courant.

        - **Superuser / staff global** : voit tous les domaines
        - **Utilisateur normal** : voit uniquement les domaines dont il est `owner` ou membre de `staff`
      summary: Lister les domaines accessibles
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDomainReadList'
          description: ''
    post:
      operationId: domain_create
      description: |-
        Crée un nouveau domaine.

        - `owner` est forcé au user courant (même si fourni dans le payload).
        - Le user courant est ajouté à `staff` automatiquement.
        - `allowed_languages` doit être un sous-ensemble de `settings.LANGUAGES`.
      summary: Créer un domaine
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
  /api/domain/{domain_id}/:
    get:
      operationId: domain_retrieve
      description: |-
        Retourne un domaine (par `domain_id`).

        ⚠️ Si l'utilisateur n'a pas accès au domaine, l'API renvoie généralement **404** (car `get_queryset()` ne retourne pas l'objet).
      summary: Récupérer un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '404':
          description: Not found (domain non visible ou inexistant).
    put:
      operationId: domain_update
      description: |-
        Met à jour un domaine (PUT).

        - Réservé à : superuser / staff global / owner / staff du domaine.
        - `owner` est **read-only** (ne peut pas être modifié via l'API).
      summary: Mettre à jour un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '403':
          description: Forbidden.
        '404':
          description: Not found (domain non visible ou inexistant).
    patch:
      operationId: domain_partial_update
      description: |-
        Met à jour partiellement un domaine (PATCH).

        - Réservé à : superuser / staff global / owner / staff du domaine.
        - `owner` est **read-only** (ne peut pas être modifié via l'API).
      summary: Modifier partiellement un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDomainPartialRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDomainPartialRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDomainPartialRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainRead'
          description: ''
        '400':
          description: Validation error.
        '401':
          description: Authentication required.
        '403':
          description: Forbidden.
        '404':
          description: Not found (domain non visible ou inexistant).
    delete:
      operationId: domain_destroy
      description: |-
        Supprime un domaine.

        - Réservé à : superuser / staff global / owner / staff du domaine.
        ⚠️ La suppression peut échouer si le domaine est référencé ailleurs (FK en PROTECT côté modèles liés).
      summary: Supprimer un domaine
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: Identifiant du domaine (correspond à `<int:domain_id>` dans l'URL).
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Deleted.
        '401':
          description: Authentication required.
        '403':
          description: Forbidden.
        '404':
          description: Not found (domain non visible ou inexistant).
  /api/domain/{domain_id}/details/:
    get:
      operationId: domain_details_retrieve
      summary: Récupérer un domaine avec détails
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: ID du domaine.
        required: true
      tags:
      - Domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
  /api/domain/{domain_id}/member-role/:
    post:
      operationId: domain_member_role_create
      parameters:
      - in: path
        name: domain_id
        schema:
          type: integer
        description: A unique integer value identifying this domain.
        required: true
      tags:
      - domain
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DomainWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainWrite'
          description: ''
  /api/domain/available-for-linking/:
    get:
      operationId: domain_available_for_linking_retrieve
      tags:
      - domain
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainWrite'
          description: ''
  /api/lang/:
    get:
      operationId: lang_list
      description: |
        Liste paginée des langues.

        Supporte :
        - `search` (DRF SearchFilter sur `code`, `name`)
        - `ordering` (DRF OrderingFilter sur `code`, `name`, `id`)
      summary: Lister les langues
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
      - in: query
        name: code
        schema:
          type: string
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Tri (ex: "code", "-name", "id").'
      - in: query
        name: page
        schema:
          type: integer
        description: Numéro de page (si pagination activée).
      - in: query
        name: page_size
        schema:
          type: integer
        description: Taille de page (si PageNumberPagination configurée).
      - in: query
        name: search
        schema:
          type: string
        description: Recherche simple sur code/name.
      tags:
      - Language
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLanguageReadList'
          description: ''
    post:
      operationId: lang_create
      summary: Créer une langue
      tags:
      - Language
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LanguageWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LanguageWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LanguageWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageRead'
          description: ''
        '400':
          description: Validation error
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
  /api/lang/{lang_id}/:
    get:
      operationId: lang_retrieve
      summary: Récupérer une langue
      parameters:
      - in: path
        name: lang_id
        schema:
          type: integer
        description: ID de la langue.
        required: true
      tags:
      - Language
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
    put:
      operationId: lang_update
      summary: Mettre à jour une langue (PUT)
      parameters:
      - in: path
        name: lang_id
        schema:
          type: integer
        description: ID de la langue.
        required: true
      tags:
      - Language
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LanguageWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LanguageWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LanguageWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageRead'
          description: ''
        '400':
          description: Validation error
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
    patch:
      operationId: lang_partial_update
      summary: Mettre à jour une langue (PATCH)
      parameters:
      - in: path
        name: lang_id
        schema:
          type: integer
        description: ID de la langue.
        required: true
      tags:
      - Language
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedLanguagePartialRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedLanguagePartialRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedLanguagePartialRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageRead'
          description: ''
        '400':
          description: Validation error
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
    delete:
      operationId: lang_destroy
      summary: Supprimer une langue
      parameters:
      - in: path
        name: lang_id
        schema:
          type: integer
        description: ID de la langue.
        required: true
      tags:
      - Language
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No Content
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
  /api/question/:
    get:
      operationId: question_list
      description: |
        Liste paginée des questions.

        Supporte :
        - `search` (filtre title__icontains)
      summary: Lister les questions
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
      - in: query
        name: domain
        schema:
          type: integer
      - in: query
        name: is_mode_exam
        schema:
          type: boolean
      - in: query
        name: is_mode_practice
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Recherche simple (title__icontains).
      tags:
      - Question
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedQuestionReadList'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
    post:
      operationId: question_create
      description: |
        Crée une question.

        ⚠️ Les médias NE sont PAS uploadés ici.

        Workflow recommandé :
        1. POST /api/question/media/ → upload fichier ou URL externe
        2. Récupérer les `id` des MediaAsset retournés
        3. POST /api/question/ avec `media_asset_ids: [1, 2, 3]`

        Payload supporté : JSON ou multipart/form-data.
        - `subject_ids`: liste d'IDs
        - `answer_options`: JSON (liste)
        - `media_asset_ids`: liste d'IDs MediaAsset
      summary: Créer une question (multipart ou JSON)
      tags:
      - Question
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionWritePayloadRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Validation error
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
  /api/question/{question_id}/:
    get:
      operationId: question_retrieve
      summary: Récupérer une question
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        description: ID de la question (question_id).
        required: true
      tags:
      - Question
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionRead'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
    put:
      operationId: question_update
      description: |
        Met à jour une question.

        Les médias sont gérés via `/api/question/media/`.
        Utiliser `media_asset_ids` pour lier/délier les médias.
      summary: Mettre à jour une question (PUT)
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        description: ID de la question (question_id).
        required: true
      tags:
      - Question
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionWritePayloadRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Validation error
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
    patch:
      operationId: question_partial_update
      description: |
        Met à jour une question.

        Les médias sont gérés via `/api/question/media/`.
        Utiliser `media_asset_ids` pour lier/délier les médias.
      summary: Mettre à jour une question (PATCH)
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        description: ID de la question (question_id).
        required: true
      tags:
      - Question
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedQuestionPartialWritePayloadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedQuestionPartialWritePayloadRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedQuestionPartialWritePayloadRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionRead'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Validation error
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
    delete:
      operationId: question_destroy
      summary: Supprimer une question
      parameters:
      - in: path
        name: question_id
        schema:
          type: integer
        description: ID de la question (question_id).
        required: true
      tags:
      - Question
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No Content
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Not found
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden (admin only)
  /api/question/media/:
    post:
      operationId: question_media_create
      description: |-
        Upload un fichier (multipart) ou enregistre une URL externe.
        - multipart: envoyer `file`
        - json/form: envoyer `external_url`

        Retourne un `MediaAsset` (id à réutiliser dans `media_asset_ids` lors de la création/màj d'une Question).
      summary: Uploader un média (dédup sha256) ou enregistrer un média externe
      tags:
      - Question
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MediaAssetUploadRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MediaAssetUploadRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/MediaAssetUploadRequest'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAsset'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAsset'
          description: ''
        '400':
          description: Validation error
  /api/question/media/external/:
    post:
      operationId: question_media_external_create
      tags:
      - question
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionWrite'
          description: ''
  /api/question/media/upload/:
    post:
      operationId: question_media_upload_create
      tags:
      - question
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuestionWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuestionWriteRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionWrite'
          description: ''
  /api/quiz/:
    get:
      operationId: quiz_list
      description: |
        Liste paginée des sujets.

        Supporte :
        - `search` (filtre name__icontains)
        - `name`, `quiz_id` via DjangoFilterBackend
      summary: Lister les quizzes (sessions)
      parameters:
      - in: query
        name: name
        schema:
          type: string
        description: Filtre exact (via DjangoFilterBackend).
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Recherche simple (name__icontains).
      tags:
      - Quiz
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedQuizListList'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Unauthorized
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
          description: Forbidden
    post:
      operationId: quiz_create
      summary: Créer un quiz à partir d'un template de quiz
      tags:
      - Quiz
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuizInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateQuizInputRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateQuizInputRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
          description: ''
  /api/quiz/{quiz_id}/:
    get:
      operationId: quiz_retrieve
      summary: Détail d’un quiz (session)
      parameters:
      - in: path
        name: quiz_id
        schema:
          type: integer
        required: true
      tags:
      - Quiz
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
          description: ''
    put:
      operationId: quiz_update
      summary: Mettre à jour un quiz
      parameters:
      - in: path
        name: quiz_id
        schema:
          type: integer
        required: true
      tags:
      - Quiz
      requestBody:
