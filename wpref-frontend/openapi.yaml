      type: object
      properties:
        translations:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LocalizedNameDescriptionTranslationRequest'
          writeOnly: true
          description: 'Ex: {"fr":{"name":"Math","description":""},"nl":{"name":"Wiskunde","description":""}}'
        domain:
          type: integer
        active:
          type: boolean
      required:
      - domain
      - translations
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
      required:
      - access
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - refresh
    TranslateBatchRequestRequest:
      type: object
      properties:
        source:
          type: string
          minLength: 1
          maxLength: 10
        target:
          type: string
          minLength: 1
          maxLength: 10
        items:
          type: array
          items:
            $ref: '#/components/schemas/TranslateItemRequest'
      required:
      - items
      - source
      - target
    TranslateBatchResponse:
      type: object
      properties:
        translations:
          type: object
          additionalProperties:
            type: string
      required:
      - translations
    TranslateItemRequest:
      type: object
      properties:
        key:
          type: string
          minLength: 1
        text:
          type: string
        format:
          allOf:
          - $ref: '#/components/schemas/FormatEnum'
          default: text
      required:
      - key
      - text
    UserSummary:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
      required:
      - id
      - username
    VisibilityEnum:
      enum:
      - immediate
      - scheduled
      - never
      type: string
      description: |-
        * `immediate` - Immédiat
        * `scheduled` - À partir d'une date
        * `never` - Jamais
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
