  /api/translate/batch/:
    post:
      operationId: translate_batch_create
      description: Traduit une liste d'éléments en une seule requête. Chaque item
        peut être en `format=text` ou `format=html`. Les entrées vides sont ignorées
        (pas d'appel DeepL), donc elles peuvent ne pas apparaître dans la map `translations`.
      summary: Traduction batch (DeepL) - texte et HTML
      tags:
      - Translation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranslateBatchRequestRequest'
            examples:
              RequestExample(mixedText/html):
                value:
                  source: fr
                  target: nl
                  items:
                  - key: name.fr
                    text: Natation
                    format: text
                  - key: desc.fr
                    text: <p>Sport aquatique</p>
                    format: html
                  - key: empty_html
                    text: <p><br></p>
                    format: html
                  - key: empty_text
                    text: '   '
                    format: text
                summary: Exemple de requête avec items texte et HTML
                description: Le backend groupe les items par format et fait 1 appel
                  DeepL par format.
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TranslateBatchRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TranslateBatchRequestRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranslateBatchResponse'
              examples:
                ResponseExample:
                  value:
                    translations:
                      name.fr: Zwemmen
                      desc.fr: <p>Watersport</p>
                  summary: Exemple de réponse
                  description: La réponse est une map `key -> traduction`. Les items
                    vides ignorés ne sont pas renvoyés.
          description: ''
        '400':
          description: Validation error (payload invalide)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '502':
          description: DeepL upstream error
