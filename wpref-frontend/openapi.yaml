components:
  schemas:
    AnswerCorrectnessStateEnum:
      enum:
      - full
      - unknown
      - hidden
      type: string
      description: |-
        * `full` - full
        * `unknown` - unknown
        * `hidden` - hidden
    BulkCreateFromTemplateInputRequest:
      type: object
      properties:
        quiz_template_id:
          type: integer
        user_ids:
          type: array
          items:
            type: integer
      required:
      - quiz_template_id
      - user_ids
    CreateQuizInputRequest:
      type: object
      properties:
        quiz_template_id:
          type: integer
      required:
      - quiz_template_id
    CustomUserAdminUpdateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        language:
          $ref: '#/components/schemas/LanguageEnum'
        password:
          type: string
          writeOnly: true
          minLength: 1
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        password_change_required:
          type: boolean
    CustomUserCreateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 1
        language:
          $ref: '#/components/schemas/LanguageEnum'
        managed_domain_ids:
          type: array
          items:
            type: integer
            minimum: 1
          writeOnly: true
      required:
      - password
      - username
    CustomUserRead:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        language:
          $ref: '#/components/schemas/LanguageEnum'
        email_confirmed:
          type: boolean
          readOnly: true
        password_change_required:
          type: boolean
          readOnly: true
        is_superuser:
          type: boolean
          readOnly: true
          title: Superuser status
