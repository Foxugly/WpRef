<app-quiz-list-toolbar
  [search]="q()"
  [isAdmin]="isAdmin()"
  (searchChange)="q.set($event)"
  (compose)="goCompose()"
  (quickCreate)="goNew()"
></app-quiz-list-toolbar>

<p-tabs [value]="activeTab()" (valueChange)="setActiveTab($event)" class="quiz-tabs">
  <p-tablist>
    <p-tab value="templates">Quiz templates</p-tab>
    <p-tab value="sessions">Mes quiz</p-tab>
  </p-tablist>

  <p-tabpanels>
    <p-tabpanel value="templates">
      <app-quiz-template-table
        title="Ceux que j'ai crees"
        description="Templates dont tu es le createur."
        [kind]="'created'"
        [templates]="filteredCreatedTemplates()"
        [loading]="loading()"
        [creatingTemplateId]="creatingTemplateId()"
        (createFromTemplate)="createFromTemplate($event)"
        (openAssign)="openAssignDialog($event)"
        (openResults)="openResultsDialog($event)"
        (edit)="goEditTemplate($event)"
        (remove)="goDeleteTemplate($event)"
      ></app-quiz-template-table>

      <app-quiz-template-table
        title="Ceux qui sont publics"
        description="Templates visibles et partageables."
        [kind]="'public'"
        [templates]="filteredPublicTemplates()"
        [loading]="loading()"
        [creatingTemplateId]="creatingTemplateId()"
        (createFromTemplate)="createFromTemplate($event)"
      ></app-quiz-template-table>
    </p-tabpanel>

    <p-tabpanel value="sessions">
      <app-quiz-session-table
        [quizzes]="filteredMyQuizzes()"
        [loading]="loading()"
        (viewQuiz)="goView($event)"
      ></app-quiz-session-table>
    </p-tabpanel>
  </p-tabpanels>
</p-tabs>

<app-quiz-template-assign-dialog
  [visible]="assignDialogVisible()"
  [template]="selectedTemplate()"
  [users]="assignableUsers()"
  [selectedRecipientIds]="selectedRecipientIds()"
  [assigning]="assigning()"
  (visibleChange)="assignDialogVisible.set($event)"
  (selectedRecipientIdsChange)="selectedRecipientIds.set($event)"
  (cancel)="closeAssignDialog()"
  (submitted)="submitAssignments()"
></app-quiz-template-assign-dialog>

<app-quiz-template-results-dialog
  [visible]="resultsDialogVisible()"
  [template]="selectedTemplate()"
  [sessions]="templateSessions()"
  [loading]="resultsLoading()"
  (visibleChange)="resultsDialogVisible.set($event)"
  (close)="closeResultsDialog()"
  (viewQuiz)="goView($event)"
></app-quiz-template-results-dialog>
