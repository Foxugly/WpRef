<div class="page">
  <div class="header-line">
    <div class="header-line__left">
      <p-button
        (onClick)="goBack()"
        icon="pi pi-arrow-left"
        [label]="ui().common.back"
        class="page-back-button"
        severity="secondary"
        type="button"
        variant="outlined">
      </p-button>
    </div>

    <div class="header-center">
      <h1 class="title">{{ ui().pages.quizQuick.title }}</h1>
      <p class="subtitle muted">{{ ui().pages.quizQuick.subtitle }}</p>
    </div>

    <div class="header-line__right"></div>
  </div>

  <div class="quick-page">
    <app-quiz-subject-form
      #subjectForm
      (generate)="onGenerate($event)"
      (subjectsChange)="onSubjectsChange($event)"
      [maxQuestions]="maxQuestions()"
      [saving]="saving()"
      [success]="success()">
    </app-quiz-subject-form>

    <div class="quick-page__actions">
      <p-button
        (onClick)="submit()"
        [disabled]="saving()"
        [loading]="saving()"
        icon="pi pi-sync"
        [label]="ui().pages.quizQuick.submit"
        type="button">
      </p-button>
      <p-button
        (onClick)="goBack()"
        [label]="ui().common.cancel"
        severity="secondary"
        type="button"
        variant="outlined">
      </p-button>
    </div>
  </div>
</div>
