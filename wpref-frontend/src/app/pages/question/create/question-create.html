<div class="page">
  <div class="header-line">
    <div class="header-line__left">
      <p-button
        (onClick)="goBack()"
        icon="pi pi-arrow-left"
        [label]="ui().common.back"
        class="page-back-button"
        severity="secondary"
        type="button"
        variant="outlined">
      </p-button>
    </div>

    <div class="header-center">
      <h1 class="title">{{ ui().pages.questionCreate.title }}</h1>
      <p class="subtitle muted">{{ ui().pages.questionCreate.subtitle }}</p>
    </div>

    <div class="header-line__right"></div>
  </div>

  @if (loading()) {
    <div class="card">
      <p class="muted">Chargement...</p>
    </div>
  } @else {
    @if (error()) {
      <div class="card">
        <div class="alert alert--error">{{ error() }}</div>
      </div>
    }

    <app-question-editor-form
      [activeLang]="activeLang()"
      [domainOptions]="domainOptions()"
      [emptyLanguagesMessage]="emptyLanguagesMessage"
      [form]="form"
      [practiceTooltip]="practiceTooltip"
      [saving]="saving()"
      [showDomainSelect]="true"
      [showTranslateAction]="true"
      [subjectOptions]="subjectOptions()"
      [submitError]="submitError()"
      [submitLabel]="ui().common.create"
      [tabCodes]="tabCodes()"
      [translating]="translating()"
      (addOptionClicked)="addOption()"
      (cancelClicked)="goBack()"
      (cleanActiveClicked)="clearActiveTab()"
      (removeOptionClicked)="removeOption($event)"
      (submitted)="save()"
      (tabChanged)="onTabChange($event)"
      (translateActive)="translateFromActiveTab()">
    </app-question-editor-form>
  }
</div>
