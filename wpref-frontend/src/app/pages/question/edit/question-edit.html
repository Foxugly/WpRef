<div class="page">
  <div class="header-line">
    <div class="header-line__left">
      <p-button
        (onClick)="goBack()"
        icon="pi pi-arrow-left"
        [label]="ui().common.back"
        class="page-back-button"
        severity="secondary"
        type="button"
        variant="outlined">
      </p-button>
    </div>

    <div class="header-center">
      <h1 class="title">{{ ui().pages.questionEdit.title }}</h1>
      <p class="subtitle muted">{{ ui().pages.questionEdit.subtitle }}</p>
    </div>

    <div class="header-line__right"></div>
  </div>

  @if (error()) {
    <div class="error">
      {{ error() }}
    </div>
  }

  @if (success()) {
    <div class="success">
      {{ success() }}
    </div>
  }

  @if (loading()) {
    <div class="status-card">Chargement...</div>
  } @else if (question(); as q) {
    <app-question-editor-form
      [activeLang]="activeLang()"
      [domainReadonlyLabel]="getDomainLabel(q.domain)"
      [duplicateLabel]="ui().common.duplicate"
      [emptyLanguagesMessage]="emptyLanguagesMessage"
      [form]="form"
      [deleting]="deleting()"
      [saving]="saving()"
      [showDuplicateAction]="true"
      [showDeleteAction]="true"
      [showCleanAction]="true"
      [showDomainSelect]="false"
      [showTranslateAction]="true"
      [subjectOptions]="subjectOptions()"
      [submitError]="submitError()"
      [submitLabel]="ui().common.save"
      [tabCodes]="tabCodes()"
      [translating]="translating()"
      (addOptionClicked)="addOption()"
      (cancelClicked)="goBack()"
      (cleanActiveClicked)="clearActiveTab()"
      (deleteClicked)="deleteQuestion()"
      (duplicateClicked)="duplicateQuestion()"
      (removeOptionClicked)="removeOption($event)"
      (submitted)="save()"
      (tabChanged)="onTabChange($event)"
      (translateActive)="translateFromActiveTab()">
    </app-question-editor-form>
  }
</div>
