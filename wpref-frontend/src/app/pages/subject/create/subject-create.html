<div class="page">
  <div class="header-line">
    <div class="header-line__left">
      <p-button
        (onClick)="goList()"
        icon="pi pi-arrow-left"
        [label]="ui().common.back"
        class="page-back-button"
        severity="secondary"
        type="button"
        variant="outlined">
      </p-button>
    </div>

    <div class="header-center">
      <h1 class="title">{{ ui().pages.subjectCreate.title }}</h1>
      <p class="subtitle muted">{{ ui().pages.subjectCreate.subtitle }}</p>
    </div>

    <div class="header-line__right"></div>
  </div>

  @if (loading()) {
    <div class="card">
      <p class="muted">Chargement...</p>
    </div>
  } @else {
    <app-subject-editor-form
      [activeLang]="activeLang()"
      [domainOptions]="domainOptions()"
      [emptyLanguagesMessage]="emptyLanguagesMessage"
      [form]="form"
      [loading]="loading()"
      [selectedDomainId]="selectedDomainId()"
      [showDomainSelect]="true"
      [submitError]="submitError()"
      [submitLabel]="ui().common.create"
      [tabCodes]="tabCodes()"
      [translating]="translating()"
      (cancel)="goList()"
      (domainChange)="onDomainChange($event)"
      (submitForm)="submit()"
      (tabChange)="onTabChange($event)"
      (translateActive)="translateFromActiveTab()">
    </app-subject-editor-form>
  }
</div>
