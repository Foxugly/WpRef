<header class="topbar">
  <div class="topbar__inner">
    <button pButton (click)="goHome()" class="brand" type="button">
      <span class="brand__mark">
        <img [alt]="app.name" [src]="app.logoSvg" class="brand__logo">
      </span>
      <span class="brand__text">
        <span class="brand__name">{{ app.name }}</span>
      </span>
    </button>

    <nav class="nav" aria-label="Navigation principale">
      @for (item of navItems; track item.label) {
        <a
          [routerLink]="item.link"
          class="nav__link"
          routerLinkActive="nav__link--active"
          [class.nav__link--accent]="item.accent"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="topbar__actions">
      @if (currentUser) {
        <button pButton (click)="goAlerts()" [attr.aria-label]="ui.topmenu.alertsAria" class="alert-link" type="button">
          <i class="pi pi-envelope"></i>
          @if (unreadAlertCount > 0) {
            <span class="alert-link__badge">{{ unreadAlertCount }}</span>
          }
        </button>
        <p-button
          [label]="currentDomainLabel"
          icon="pi pi-building"
          severity="secondary"
          styleClass="domain-trigger"
          (click)="toggleDomainMenu($event)"
        ></p-button>
        <p-menu
          #domainMenu
          [model]="domainMenuItems"
          [popup]="true"
          styleClass="domain-menu"
        ></p-menu>
      }
      <app-lang-select
        (langChange)="onLangChange($event)"
        [lang]="currentLang"
      >
      </app-lang-select>
      <app-user-menu></app-user-menu>
    </div>
  </div>
</header>
