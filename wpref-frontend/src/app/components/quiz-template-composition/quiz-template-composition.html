<div class="card builder-card">
  <div class="card-head">
    <div class="card-head__title-row">
      <h2 class="card-title">{{ texts.compositionTitle }}</h2>
      <button
        class="info-button"
        type="button"
        [pTooltip]="texts.compositionHelp"
        tooltipPosition="top"
      >
        <i class="pi pi-info-circle"></i>
      </button>
    </div>
  </div>

  @if (items.length === 0) {
    <div class="empty-state">{{ texts.compositionEmpty }}</div>
  } @else {
    <div class="selected-list">
      @for (entry of items; track entry.questionId; let i = $index) {
        <article class="selected-card">
          <div class="selected-card__header">
            <div class="selected-card__meta-row">
              <span class="order-pill">#{{ entry.item.sort_order }}</span>
            </div>

            <div class="weight-input-wrap">
              <span class="weight-stepper__label">{{ texts.weight }}</span>
              <p-inputnumber
                buttonLayout="horizontal"
                inputStyleClass="weight-input"
                inputId="weight-{{ i }}"
                spinnerMode="horizontal"
                [showButtons]="true"
                [step]="1"
                [min]="1"
                [max]="20"
                [minFractionDigits]="0"
                [maxFractionDigits]="0"
                [ngModel]="entry.item.weight"
                (ngModelChange)="weightSet.emit({index: i, value: $event ?? 1})">
                <ng-template #incrementbuttonicon>
                  <span class="pi pi-plus"></span>
                </ng-template>
                <ng-template #decrementbuttonicon>
                  <span class="pi pi-minus"></span>
                </ng-template>
              </p-inputnumber>
            </div>

            <div class="selected-card__actions">
              <p-button
                (onClick)="previewQuestion.emit(entry.questionId)"
                icon="pi pi-eye"
                severity="secondary"
                size="small"
                type="button"
                variant="outlined">
              </p-button>
              <p-button
                (onClick)="moveQuestion.emit({index: i, direction: -1})"
                [disabled]="i === 0"
                icon="pi pi-arrow-up"
                severity="secondary"
                size="small"
                type="button">
              </p-button>
              <p-button
                (onClick)="moveQuestion.emit({index: i, direction: 1})"
                [disabled]="i === items.length - 1"
                icon="pi pi-arrow-down"
                severity="secondary"
                size="small"
                type="button">
              </p-button>
              <p-button
                (onClick)="removeQuestion.emit(i)"
                icon="pi pi-trash"
                severity="danger"
                size="small"
                type="button">
              </p-button>
            </div>
          </div>

          <h3>{{ entry.title }}</h3>

          @if (entry.subjectsLabel) {
            <p class="muted">{{ entry.subjectsLabel }}</p>
          }
        </article>
      }
    </div>
  }
</div>
