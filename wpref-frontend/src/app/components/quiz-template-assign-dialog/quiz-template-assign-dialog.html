<p-dialog
  [visible]="visible()"
  (visibleChange)="onVisibleChange($event)"
  [modal]="true"
  [style]="{width: '34rem'}"
  header="Envoyer le quiz"
  (onHide)="onCancel()"
>
  @if (template(); as selectedTemplate) {
    <div class="dialog-stack">
      <p class="dialog-intro">
        Selectionne une ou plusieurs personnes pour leur envoyer
        <strong>{{ selectedTemplate.title }}</strong>.
      </p>

      <div class="recipient-list">
        @for (user of users(); track user.id) {
          <label class="recipient-row">
            <p-checkbox
              [binary]="true"
              [inputId]="'assign-user-' + user.id"
              [ngModel]="selectedRecipientIds().includes(user.id)"
              (ngModelChange)="toggleRecipient(user.id, !!$event)"
            ></p-checkbox>
            <span class="recipient-row__identity">
              <strong>{{ user.username }}</strong>
              <small>{{ user.email }}</small>
            </span>
          </label>
        }
      </div>
    </div>
  }

  <ng-template pTemplate="footer">
    <p-button (onClick)="onCancel()" label="Annuler" severity="secondary" text></p-button>
    <p-button
      (onClick)="onSubmit()"
      [disabled]="!selectedRecipientIds().length"
      [loading]="assigning()"
      icon="pi pi-send"
      label="Envoyer"
    ></p-button>
  </ng-template>
</p-dialog>
